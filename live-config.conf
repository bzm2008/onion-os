# Onion OS Live 系统完整配置
# 用户名配置
LIVE_USERNAME=onion
LIVE_HOSTNAME=onion-os
LIVE_USER_FULLNAME="Onion OS User"

# 自动登录
LIVE_CONFIG_AUTOLOGIN=true
LIVE_CONFIG_NOPASSWD=true

# 语言与地区配置
LIVE_CONFIG_LOCALES=zh_CN.UTF-8
LIVE_CONFIG_KEYBOARD_LAYOUTS=cn
LIVE_CONFIG_TIMEZONE=Asia/Shanghai

# 网络配置
LIVE_CONFIG_NETMAN=true
LIVE_CONFIG_NM=true

# 显示配置（保守但兼容）
LIVE_CONFIG_XORG=true

# 用户目录配置
LIVE_CONFIG_USERNAME=onion

# 禁用不必要的功能以提高兼容性
LIVE_CONFIG_NO_SWAP=true
LIVE_CONFIG_NO_FLOPPY=true

# 安全配置
LIVE_CONFIG_NO_ROOT_LOGIN=false
