# ============================================================================
# Onion OS 26.0.0 Home Edition - Preseed 自动安装配置
# ============================================================================
# 设计意图：
#   为 Debian Installer 提供全自动应答，实现 Onion OS 的一键安装。
#   目标用户为电脑初学者，因此采用最简配置：
#   - 自动分区（使用整个磁盘，LVM 方案）
#   - 自动创建 onion 用户
#   - 简体中文环境
#   - 无需任何命令行操作
# ============================================================================

# ======================== 本地化设置 ========================
d-i debian-installer/locale string zh_CN.UTF-8
d-i debian-installer/language string zh
d-i debian-installer/country string CN
d-i debian-installer/locale select zh_CN.UTF-8
d-i localechooser/supported-locales multiselect zh_CN.UTF-8, en_US.UTF-8

# ======================== 键盘设置 ========================
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us
d-i keyboard-configuration/variantcode string

# ======================== 网络设置 ========================
d-i netcfg/choose_interface select auto
d-i netcfg/hostname string onion-os
d-i netcfg/domain string local
d-i netcfg/wireless_show_essids select manual
d-i netcfg/disable_autoconfig boolean false

# ======================== 镜像源设置 ========================
d-i mirror/country string manual
d-i mirror/http/hostname string mirrors.tuna.tsinghua.edu.cn
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

# ======================== 用户与密码 ========================
d-i passwd/root-login boolean false
d-i passwd/root-password password root
d-i passwd/root-password-again password root
d-i passwd/user-fullname string Onion OS User
d-i passwd/username string onion
d-i passwd/user-password password onion
d-i passwd/user-password-again password onion
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# ======================== 时钟与时区 ========================
d-i clock-setup/utc boolean true
d-i time/zone string Asia/Shanghai
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string ntp.aliyun.com

# ======================== 磁盘分区 ========================
# 使用整个磁盘，LVM 方案（适合初学者，一键安装）
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/disk string /dev/sda
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-basicfilesystems/no_swap boolean false

# ======================== 基础系统安装 ========================
d-i base-installer/install-recommends boolean false
d-i base-installer/kernel/image string linux-image-amd64

# ======================== APT 设置 ========================
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/firmware boolean true
d-i apt-setup/local0/repository string https://mirrors.tuna.tsinghua.edu.cn/debian bookworm main contrib non-free non-free-firmware
d-i apt-setup/local0/comment string TUNA Mirror
d-i apt-setup/local0/source boolean true
d-i apt-setup/security_host string mirrors.tuna.tsinghua.edu.cn/debian-security
d-i apt-setup/security_path string /

# ======================== 软件包选择 ========================
tasksel tasksel/first multiselect standard
d-i pkgsel/include string sudo curl wget openssh-client network-manager xfce4 lightdm rkhunter chkrootkit lynis bleachbit yad nftables
d-i pkgsel/upgrade select safe-upgrade
d-i pkgsel/update-policy select none

# ======================== GRUB 引导器 ========================
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# ======================== 安装完成 ========================
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true
d-i debian-installer/exit/poweroff boolean false
d-i debian-installer/exit/halt boolean false
d-i debian-installer/exit/always_halt boolean false

# ======================== Late Commands ========================
# 安装完成后执行的命令
d-i preseed/late_command string \
    in-target systemctl enable NetworkManager; \
    in-target systemctl enable lightdm; \
    in-target usermod -aG sudo onion; \
    in-target echo "onion ALL=(ALL) NOPASSWD: ALL" > /target/etc/sudoers.d/onion; \
    in-target chmod 440 /target/etc/sudoers.d/onion; \
    in-target sed -i 's/# zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /target/etc/locale.gen; \
    in-target locale-gen; \
    in-target update-locale LANG=zh_CN.UTF-8; \
    in-target ln -sf /usr/share/zoneinfo/Asia/Shanghai /target/etc/localtime; \
    in-target echo "Asia/Shanghai" > /target/etc/timezone;
