# Onion OS：VirtualBox / nomodeset 环境下由 Xorg 使用 VESA，并限定常用模式避免无输出
Section "Device"
    Identifier  "OnionVMDevice"
    Driver      "vesa"
EndSection
Section "Screen"
    Identifier  "OnionVMScreen"
    Device      "OnionVMDevice"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1024x768" "800x600" "1280x800"
    EndSubSection
EndSection
